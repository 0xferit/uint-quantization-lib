name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VYPER_VERSION: "0.4.3"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vyper
        run: pip install "vyper==${VYPER_VERSION}"

      - name: Cache Soldeer dependencies
        uses: actions/cache@v4
        with:
          path: dependencies
          key: soldeer-${{ hashFiles('soldeer.lock') }}

      - name: Install dependencies
        run: forge soldeer install

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

  kontrol:
    name: Kontrol Formal Verification
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Cache Soldeer dependencies
        uses: actions/cache@v4
        with:
          path: dependencies
          key: soldeer-${{ hashFiles('soldeer.lock') }}

      - name: Install dependencies
        run: forge soldeer install

      - name: Add swap space
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Run Kontrol proofs
        env:
          KONTROL_IMAGE: runtimeverificationinc/kontrol:ubuntu-jammy-1.0.231
        run: |
          mkdir -p .kontrol out cache
          chmod 755 .kontrol out cache
          docker run --rm \
            --user root \
            -e "VYPER_VERSION=${VYPER_VERSION}" \
            -e "HOST_UID=$(id -u)" \
            -e "HOST_GID=$(id -g)" \
            -e "PYTHONPATH=/home/user/.local/lib/python3.10/site-packages" \
            -e "XDG_CACHE_HOME=/home/user/.cache" \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            "${KONTROL_IMAGE}" \
            bash -lc '
              set -euo pipefail
              trap "chown -R ${HOST_UID}:${HOST_GID} .kontrol out cache || true" EXIT
              rm -f /home/user/.local/lib/python3.10/site-packages/typing.py
              python3 -m pip install "vyper==${VYPER_VERSION}"
              SOLIDITY_ESSENTIAL_REGEX="ProofUintQuantizationSolidity.prove_.*target_bits_256_reverts.*"
              VYPER_ESSENTIAL_REGEX="ProofUintQuantizationVyper.prove_parity_encode_checked.*"
              kontrol build --verbose --config-file kontrol.toml --config-profile ci
              kontrol prove --verbose --config-file kontrol.toml --config-profile ci \
                --reinit \
                --match-test "${SOLIDITY_ESSENTIAL_REGEX}"
              kontrol prove --verbose --config-file kontrol.toml --config-profile ci \
                --reinit \
                --match-test "${VYPER_ESSENTIAL_REGEX}"
            '
