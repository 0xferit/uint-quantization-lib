name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vyper
        run: pip install "vyper>=0.4.0,<0.5"

      - name: Install dependencies
        run: forge soldeer install

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

  kontrol:
    name: Kontrol Formal Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vyper
        run: pip install "vyper>=0.4.0,<0.5"

      - name: Install dependencies
        run: forge soldeer install

      - name: Build contracts
        run: forge build

      - name: Run Kontrol proofs
        env:
          KONTROL_IMAGE: runtimeverificationinc/kontrol:ubuntu-jammy-1.0.231
        run: |
          mkdir -p .kontrol
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            "${KONTROL_IMAGE}" \
            kontrol build --config-file kontrol.toml
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            "${KONTROL_IMAGE}" \
            kontrol prove --config-file kontrol.toml --no-use-booster \
              --match-test 'ProofUintQuantizationSolidity.proof_*'
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            "${KONTROL_IMAGE}" \
            kontrol prove --config-file kontrol.toml --no-use-booster \
              --match-test 'ProofUintQuantizationVyper.proof_*'
